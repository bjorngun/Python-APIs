name: Test and Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-semver-label:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - name: Require exactly one SemVer label
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        set -euo pipefail

        semver_labels=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json labels \
          --jq '.labels[].name | select(startswith("semver:"))')

        semver_count=$(printf '%s\n' "$semver_labels" | sed '/^$/d' | wc -l | tr -d ' ')
        if [ "$semver_count" -ne 1 ]; then
          echo "::error::PR #$PR_NUMBER must have exactly one SemVer label: semver:major, semver:minor, or semver:none."
          echo "::error::Found ${semver_count} SemVer label(s): ${semver_labels:-<none>}"
          echo "::error::See the Versioning and Release Flow section in README.md."
          exit 1
        fi

        semver_label=$(printf '%s\n' "$semver_labels" | sed '/^$/d')
        echo "PR #$PR_NUMBER has a valid SemVer label: $semver_label"

  check-links:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4.2.2

    - name: Set up Python
      uses: actions/setup-python@v5.6.0
      with:
        python-version: '3.14'

    - name: Install bosos-dev-tools
      run: |
        python -m pip install --upgrade pip
        python -m pip install bosos-dev-tools

    - name: Check markdown links
      run: md-link-checker --root .

  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.14']
    steps:
    - uses: actions/checkout@v4.2.2

    - name: Set up Python
      uses: actions/setup-python@v5.6.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install ".[test,lint]"

    - name: Run linter
      run: pylint --rcfile=.pylintrc src/python_apis/

    - name: Run tests
      env:
        PYTHONPATH: src
      run: python -m unittest discover -s src/tests -p "test_*.py" -v

  publish:
    needs: [check-links, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - uses: actions/checkout@v4.2.2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5.6.0
      with:
        python-version: '3.14'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip build twine

    - name: Determine SemVer bump from merged PR label
      id: semver
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail

        pr_number=$(gh api \
          -H "Accept: application/vnd.github+json" \
          "/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
          --jq '.[0].number // empty')

        if [ -z "$pr_number" ]; then
          echo "::error::No pull request found for commit ${GITHUB_SHA}."
          echo "::error::Publishing requires a merged PR with exactly one SemVer label: semver:major, semver:minor, or semver:none."
          exit 1
        fi

        semver_labels=$(gh pr view "$pr_number" --repo "$GITHUB_REPOSITORY" --json labels \
          --jq '.labels[].name | select(startswith("semver:"))')

        semver_count=$(printf '%s\n' "$semver_labels" | sed '/^$/d' | wc -l | tr -d ' ')
        if [ "$semver_count" -ne 1 ]; then
          echo "::error::PR #$pr_number must have exactly one SemVer label (semver:major, semver:minor, semver:none)."
          echo "Found labels: ${semver_labels:-<none>}"
          exit 1
        fi

        semver_label=$(printf '%s\n' "$semver_labels" | sed '/^$/d')
        case "$semver_label" in
          semver:major)
            bump_type="major"
            publish_enabled="true"
            ;;
          semver:minor)
            bump_type="minor"
            publish_enabled="true"
            ;;
          semver:none)
            bump_type="none"
            publish_enabled="false"
            ;;
          *)
            echo "::error::Unsupported SemVer label: $semver_label"
            exit 1
            ;;
        esac

        echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
        echo "semver_label=$semver_label" >> "$GITHUB_OUTPUT"
        echo "bump_type=$bump_type" >> "$GITHUB_OUTPUT"
        echo "publish_enabled=$publish_enabled" >> "$GITHUB_OUTPUT"

        echo "Resolved release mode: PR #$pr_number, label=$semver_label, bump=$bump_type, publish=$publish_enabled"

    - name: Bump version
      id: bump
      if: steps.semver.outputs.publish_enabled == 'true'
      run: |
        chmod +x .github/scripts/bump-version.sh
        .github/scripts/bump-version.sh "${{ steps.semver.outputs.bump_type }}"

    - name: Commit version bump
      if: steps.semver.outputs.publish_enabled == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add pyproject.toml
        git commit -m "chore: Bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
        git push

    - name: Skip publish for semver:none
      if: steps.semver.outputs.publish_enabled == 'false'
      run: |
        echo "SemVer label is semver:none for PR #${{ steps.semver.outputs.pr_number }}."
        echo "Skipping version bump and PyPI publish."

    - name: Build and publish
      if: steps.semver.outputs.publish_enabled == 'true'
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      run: |
        python -m build
        python -m twine upload dist/*
